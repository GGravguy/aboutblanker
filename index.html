<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Google Classroom</title>
<link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f2027;
    --bg2:#203a43;
    --bg3:#2c5364;
    --glass:rgba(255,255,255,0.08);
    --text:white;
}

@media (prefers-color-scheme: light){
    :root{
        --bg1:#e3f2fd;
        --bg2:#bbdefb;
        --bg3:#90caf9;
        --glass:rgba(255,255,255,0.6);
        --text:#111;
    }
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3));
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:var(--text);
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    backdrop-filter:blur(30px);
    background:var(--glass);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:35px;
    padding:60px;
    width:90%;
    max-width:750px;
    text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,0.6);
    transition:0.4s ease;
}

.container:hover{
    transform:scale(1.02);
}

h1{
    font-size:3rem;
    font-weight:800;
    margin-bottom:35px;
    background:linear-gradient(90deg,#00f5ff,#ff00f7,#00ff88);
    background-size:300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:neon 6s linear infinite;
}

@keyframes neon{
    0%{background-position:0%}
    100%{background-position:300%}
}

.input-wrapper{
    display:flex;
    gap:15px;
}

input{
    flex:1;
    padding:18px;
    border-radius:20px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.2);
    font-size:1rem;
    transition:0.3s;
    color:var(--text);
}

input:focus{
    box-shadow:0 0 25px #00f5ff;
}

button{
    padding:18px 30px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:600;
    background:linear-gradient(135deg,#00f5ff,#ff00f7);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 0 30px #ff00f7;
}

.theme-toggle{
    position:absolute;
    top:20px;
    right:20px;
    padding:10px 18px;
    border-radius:15px;
    border:none;
    cursor:pointer;
    backdrop-filter:blur(10px);
    background:var(--glass);
    color:var(--text);
}

/* Ripple */
.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple 600ms linear;
    background:rgba(255,255,255,0.5);
}
@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

/* Mouse Glow */
.cursor-glow{
    position:absolute;
    width:25px;
    height:25px;
    border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle,#00f5ff,transparent 70%);
    filter:blur(10px);
}
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>

<div class="container">
    <h1>About:Blanker</h1>
    <div class="input-wrapper">
        <input type="text" id="urlInput" placeholder="Enter website (example.com)">
        <button onclick="openBlank()">Launch</button>
    </div>
</div>

<script>
// Theme toggle
function toggleTheme(){
    if(document.documentElement.style.getPropertyValue('--bg1') === '#000'){
        location.reload();
    } else {
        document.documentElement.style.setProperty('--bg1','#000');
        document.documentElement.style.setProperty('--bg2','#111');
        document.documentElement.style.setProperty('--bg3','#222');
        document.documentElement.style.setProperty('--glass','rgba(255,255,255,0.05)');
        document.documentElement.style.setProperty('--text','white');
    }
}

// Ripple effect
document.addEventListener("click",function(e){
    const ripple=document.createElement("span");
    ripple.className="ripple";
    ripple.style.left=e.pageX+"px";
    ripple.style.top=e.pageY+"px";
    ripple.style.width=ripple.style.height="20px";
    document.body.appendChild(ripple);
    setTimeout(()=>ripple.remove(),600);
});

// Mouse glow
const glow=document.createElement("div");
glow.className="cursor-glow";
document.body.appendChild(glow);
document.addEventListener("mousemove",(e)=>{
    glow.style.left=e.pageX-12+"px";
    glow.style.top=e.pageY-12+"px";
});

// UPDATED FUNCTION ONLY (as requested)
function openBlank(){
    let url=document.getElementById("urlInput").value.trim();
    if(!url) return;
    if(!url.startsWith("http")) url="https://"+url;

    const w = window.open("about:blank", "_blank");

    w.document.write(`
        <html>
        <head>
            <title>Google Classroom</title>
            <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png">
            <style>
                html,body{
                    margin:0;
                    height:100%;
                    background:black;
                    display:flex;
                    justify-content:center;
                    align-items:center;
                    overflow:hidden;
                    font-family:Arial, sans-serif;
                }
                .loader{
                    text-align:center;
                    color:white;
                }
                .spinner{
                    width:70px;
                    height:70px;
                    border:6px solid rgba(255,255,255,0.2);
                    border-top:6px solid #00f5ff;
                    border-radius:50%;
                    animation:spin 1s linear infinite;
                    margin:auto;
                    margin-bottom:20px;
                }
                @keyframes spin{
                    0%{transform:rotate(0deg);}
                    100%{transform:rotate(360deg);}
                }
                iframe{
                    position:absolute;
                    top:0;
                    left:0;
                    width:100%;
                    height:100%;
                    border:none;
                    display:none;
                }
            </style>
        </head>
        <body>
            <div class="loader">
                <div class="spinner"></div>
                <div>Loading...</div>
            </div>

            <iframe id="siteFrame" src="${url}"></iframe>

            <script>
                const frame = document.getElementById("siteFrame");
                frame.onload = function(){
                    document.querySelector(".loader").style.display="none";
                    frame.style.display="block";
                };
            <\/script>
        </body>
        </html>
    `);
}
</script>

</body>
</html>
